<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #F2F1ED;
    font-family: 'Georgia', serif;
    display: flex; flex-direction: column; justify-content: center;
    padding: 80px;
  }
  .label { font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; color: #999; margin-bottom: 32px; font-family: monospace; }
  .headline { font-size: 64px; font-weight: 900; color: #111; line-height: 1.1; }
  .headline span { color: #D42020; }
  .sub { margin-top: 24px; font-size: 18px; color: #666; font-family: sans-serif; }
  .domain { position: absolute; bottom: 40px; right: 80px; font-size: 13px; color: #ccc; font-family: monospace; letter-spacing: 0.1em; }
</style>
</head>
<body>
  <div class="label">aah.monster</div>
  <div class="headline">personal branding<br>for c-suite<br><span>who are done</span><br>being forgettable.</div>
  <div class="sub">async · written deliverables · no calls</div>
  <div class="domain">aah.monster</div>
</body>
</html>
