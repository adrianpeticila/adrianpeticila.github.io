<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — aah, monster!</title>
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://aah.monster/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preload" as="font" href="/fonts/sono-latin.woff2" type="font/woff2" crossorigin>
  <link href="https://fonts.cdnfonts.com/css/sprite-graffiti" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Sono';
      font-style: normal;
      font-weight: 400 800;
      font-display: swap;
      src: url('/fonts/sono-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'Sono';
      font-style: normal;
      font-weight: 400 800;
      font-display: swap;
      src: url('/fonts/sono-latin-ext.woff2') format('woff2');
      unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F2F1ED;
      --ink: #111111;
      --mid: #777777;
      --red: #D42020;
    }
    html, body { height: 100%; }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Sono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .wrap {
      text-align: center;
      max-width: 480px;
    }
    .code {
      font-family: 'Sprite Graffiti', sans-serif;
      font-size: clamp(5rem, 20vw, 9rem);
      color: var(--red);
      line-height: 1;
    }
    h1 {
      font-family: 'Sprite Graffiti', sans-serif;
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      color: var(--ink);
      margin-top: 0.75rem;
    }
    p {
      color: var(--mid);
      font-size: 0.95rem;
      margin-top: 0.75rem;
      line-height: 1.6;
    }
    a.btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: var(--red);
      color: #fff;
      font-family: 'Sono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
    }
    a.btn:hover { background: #b81c1c; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>page not found.</h1>
    <p>this url doesn't exist.<br>your brand problem probably does though.</p>
    <a href="/" class="btn">back to home</a>
  </div>
</body>
</html>
